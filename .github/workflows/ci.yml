name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  extension:
    name: Extension Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Extension typecheck
        run: npm run lint

      - name: Extension tests
        run: npm test

      - name: Accuracy regression guard
        run: node scripts/backtest-guard.mjs

      - name: Extension build
        run: npm run build

  backend-api:
    name: Backend API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Backend typecheck
        run: npx tsc --noEmit

      - name: Backend tests
        run: npm test

  site:
    name: Site Build & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        run: npm ci

      - name: Site check
        run: npm run check

      - name: Site build
        run: npm run build
